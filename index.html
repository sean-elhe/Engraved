<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engraved</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <main id="practiceScreen" class="card">

    <div class="bottom">
      <div class="top-row">

        <button id="openSettings" class="icon-btn settings-open">
            <i class="fa-solid fa-gear"></i>
        </button>

        <div id="settingsOverlay" class="overlay hidden">
          <div class="settings-popup">
              <div class="menu-header">
                <h2>Settings</h2>
                <button id="closeSettings" class="icon-btn close-btn">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>

              <div class="selectors">
                <select id="bookSelect"></select>
                <select id="chapterSelect"></select>
                <select id="translationSelect"></select>
                <select id="difficultySelect"></select>
                <select id="modeSelect">
                  <option value="ordered">Sequential</option>
                  <option value="random">Randomized</option>
                </select>
              </div>
          </div>
        </div>

        <h3 id="reference"></h3>

        <button id="openAuth" class="icon-btn logIn">
            <i class="fa-solid fa-heart"></i>
        </button>

<div id="authOverlay" class="overlay2 hidden">
  <div class="settings-popup2">

    <div class="menu-header">
      <h2 id="authTitle">Account</h2>
      
      <div class="header-controls">
        <button id="closeSaved" class="icon-btn hidden">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <button id="closeAuth" class="icon-btn close-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div id="authSection" class="hidden">
        <input id="nameInput" placeholder="User">
        <input id="pinInput" type="password" placeholder="PIN">
        <button id="loginBtn" class="authBtn">Log into account</button>
        <button id="signupBtn" class="authBtn">Create account</button>
    </div>

    <div id="appSection" class="hidden">
        <button id="preferencesUI" class="dashboard-tab-btn">Preferences</button>
        <button id="savedUI" class="dashboard-tab-btn">Bookmarks</button>
        <button id="scoresUI" class="dashboard-tab-btn">Scores</button>
        <button id="logoutBtn" class="authBtn">Logout</button>
    </div>

    <div id="savedScreen" class="hidden">
        <div class="saved-chapters-section">
            <div id="savedChaptersContainer" class="saved-chapters-grid"></div>
        </div>
    </div>

  </div>
</div>
         </div> </div> 
          
        <div class="progress-container-wrapper">
        <div class="progress-row">
            <span id="progressCurrent"></span>
            <span id="progressTotal"></span>
        </div>
        <div class="progress">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>

    <button id="hintBtn" class="hintBtn hidden">HINT</button>

    <div class="center">
      <div class="verse-wrapper">
        <button id="clearBtn" class="edge-btn left">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="verse-card">
          <p id="verseText"></p>
        </div>
        <button id="nextBtn" class="edge-btn right">
            <i class="fa-solid fa-chevron-right"></i>
        </button>  
      </div>  
    </div>  

  </main>

  <main id="scoreScreen" class="score-screen hidden">
    <h2 class="chapter-title">Chapter Score</h2>

    <div class="score-main">
        <div id="chapterScore"></div>
        <section class="info-card">
            <div>
              <span>Translation</span>
              <strong id="translation">ESV</strong>
            </div>
            <div>
              <span>Difficulty</span>
              <strong id="difficulty">Easy</strong>
            </div>
            <div>
              <span>Hints Used</span>
              <strong id="hints">0</strong>
            </div>
        </section>
    </div>

    <div class="breakdown-section">
      <button id="breakdownToggle" class="breakdown-toggle">
        <span>Chapter Breakdown</span>
        <span id="breakdownArrow">▾</span>
      </button>
      <div id="verseScoreList" class="verse-score-list hidden-dropdown"></div>
    </div>

    <button id="restartBtn" class="practice-btn">↻ Practice Again</button>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
