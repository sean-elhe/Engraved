<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Engraved</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
</head>

<body>
  <main id="practiceScreen" class="card">

    <div class="top-row">

        <button id="openSettings" class="icon-btn settings-open">
            <i class="fa-solid fa-gear"></i>
        </button>

        <div id="settingsOverlay" class="overlay hidden">
          <div class="settings-popup">

              <div class="menu-header">
              
                <h2>Settings</h2>
                <button id="closeSettings" class="icon-btn close-btn">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>

              <div class="selectors">
                <select id="bookSelect"></select>
                <select id="chapterSelect"></select>
                <select id="translationSelect"></select>
                <select id="difficultySelect"></select>
                <select id="modeSelect">
                  <option value="ordered">Sequential</option>
                  <option value="random">Randomized</option>
                </select>
              </div>

          </div>
        </div>

        <h2 id="reference"></h1>

        <button id="logIn" class="icon-btn logIn">
            <i class="fa-solid fa-user-lock"></i>
        </button>

    </div> 

    <div class="progress-row">
        <span id="progressCurrent"></span>
        <progress id="progressBar" value="0" max="100"></progress>
        <span id="progressTotal"></span>
    </div>

    <p id="verseText">
    </p>

    <div class="nav-row">
       <button id="prevBtn">
          <i class="fa-solid fa-backward-step"></i>
       </button>
       <button id="submitBtn">
          <i class="fa-solid fa-flag-checkered"></i>
       </button>
       <button id="refreshBtn">
          <i class="fa-solid fa-repeat"></i>
       </button>
       <button id="nextBtn">
          <i class="fa-solid fa-arrow-right"></i>
       </button>
       <button id="hintBtn">
          <i class="fa-solid fa-lightbulb"></i>
       </button>
       <button id="clearBtn">
          <i class="fa-solid fa-trash-can"></i>
       </button>
    </div>

  </main>

  <main id="scoreScreen" class="card hidden">
    <h1 id="scoreHeader"></h1>

    <p id="scoreText"></p>
    <p id="translation">Translation: </p>
    <p id="difficulty">Difficulty: </p>
    <p id="hints">Hints used: </p>
    


    <div id="verseScoreList"></div>

    <button id="restartBtn"><</button>
  </main>

  <script src="js/script.js"></script>
</body>
